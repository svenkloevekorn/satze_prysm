name: CI

# Hinweis: CI laeuft aktuell NICHT automatisch.
# Grund: warten auf Mittwald-Server-Setup, dann wird der Workflow zusammen
# mit einem Deploy-Job neu aufgesetzt (PostgreSQL-Service, korrekte Extensions).
# Bis dahin manuell ausloesbar via "Actions" -> "CI" -> "Run workflow".
on:
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_pgsql, intl, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: ./vendor/bin/phpstan analyse --memory-limit=512M --no-progress

      - name: Run tests (Pest)
        run: php artisan test
